name: Pre-screen Community Submission

# Phase 1: parallel quality checks that don't need dictionary context.
# Scores 4 intrinsic criteria (structural, recognizability, clarity, naming)
# and classifies tags.  If quality passes, stores results and triggers the
# sequential finalize workflow (review-submission.yml).

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to pre-screen'
        required: true
        type: number

concurrency:
  # Per-issue group — prescreens run in parallel across different issues,
  # but a revision on the same issue waits for any in-progress prescreen.
  group: prescreen-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  prescreen:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'community-submission'))
      || (github.event_name == 'issue_comment'
          && (contains(github.event.issue.labels.*.name, 'needs-revision')
              || contains(github.event.issue.labels.*.name, 'quality-rejected')
              || contains(github.event.issue.labels.*.name, 'community-submission')))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run pre-screen
        env:
          REVIEW_MODE: prescreen
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          EVENT_NAME: ${{ github.event_name }}
        working-directory: bot
        run: |
          MAX_RETRIES=3
          attempt=1
          while [ $attempt -le $MAX_RETRIES ]; do
            echo "=== Attempt $attempt/$MAX_RETRIES ==="
            python review_submission.py && exit 0
            exit_code=$?
            if [ $exit_code -ne 78 ]; then
              echo "Script failed with non-retryable exit code $exit_code"
              exit $exit_code
            fi
            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "LLM providers unavailable. Waiting 5 minutes before retry..."
              sleep 300
            fi
            attempt=$((attempt + 1))
          done
          echo "All $MAX_RETRIES attempts failed."
          exit 1
