name: Process Consensus Votes

on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

# Shared concurrency group: at most 1 running + 1 pending.
# Batch submissions create many issues at once, but only 2 runs
# will execute — each processing ALL open vote issues in one go.
concurrency:
  group: process-votes
  cancel-in-progress: false

jobs:
  process-votes:
    # Run for: issue with consensus-vote label, schedule, or manual dispatch
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'consensus-vote'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Settle time
        if: github.event_name == 'issues'
        run: |
          # Brief pause to let batch-submitted issues finish arriving
          # before we fetch the full list of open votes
          sleep 10

      - name: Fetch and process all open vote issues
        id: batch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all open consensus-vote issues (up to 200)
          issues=$(gh issue list --label consensus-vote --state open \
            --json number,body,title --limit 200)
          count=$(echo "$issues" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")

          if [ "$count" = "0" ]; then
            echo "No open vote issues found"
            echo "processed=0" >> "$GITHUB_OUTPUT"
            echo "failed_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Processing $count vote issue(s)"

          echo "$issues" | python3 -c "
          import sys, json, re, os
          from pathlib import Path
          from datetime import datetime, timezone

          issues = json.load(sys.stdin)
          processed = []
          failed = []

          for issue in issues:
              number = issue['number']
              body = issue['body'].strip()

              # Extract JSON from fenced code block if present
              fence_match = re.search(r'\`\`\`(?:json)?\s*\n(.*?)\n\`\`\`', body, re.DOTALL)
              if fence_match:
                  body = fence_match.group(1)

              try:
                  data = json.loads(body)
                  slug = str(data['slug']).strip()
                  recognition = int(data['recognition'])
                  justification = str(data.get('justification', ''))[:500]
                  model_claimed = str(data.get('model_claimed', 'unknown'))
                  bot_id = str(data.get('bot_id', ''))
                  usage_status = str(data.get('usage_status', '')).strip()

                  if not (1 <= recognition <= 7):
                      failed.append((number, 'recognition must be 1-7'))
                      continue
                  if not slug:
                      failed.append((number, 'slug is required'))
                      continue

                  defn_file = Path(f'definitions/{slug}.md')
                  if not defn_file.exists():
                      failed.append((number, f'term {slug} not found'))
                      continue

                  if usage_status and usage_status not in ('active_use', 'recognize', 'rarely', 'extinct'):
                      usage_status = ''

                  term_name = defn_file.read_text(encoding='utf-8').split('\n')[0].lstrip('# ').strip()

                  # Record the vote
                  data_file = Path(f'bot/consensus-data/{slug}.json')
                  if data_file.exists():
                      consensus = json.loads(data_file.read_text())
                  else:
                      consensus = {'slug': slug, 'name': term_name, 'rounds': [], 'votes': []}

                  # Check for duplicate vote from same issue
                  if any(v.get('issue') == number for v in consensus.get('votes', [])):
                      print(f'Issue #{number}: already recorded, skipping')
                      processed.append((number, slug, recognition, model_claimed, term_name))
                      continue

                  vote_entry = {
                      'model_claimed': model_claimed,
                      'recognition': recognition,
                      'justification': justification,
                      'timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                      'source': 'mcp',
                      'issue': number,
                  }
                  if bot_id:
                      vote_entry['bot_id'] = bot_id
                  if usage_status:
                      vote_entry['usage_status'] = usage_status
                  consensus['votes'].append(vote_entry)

                  data_file.parent.mkdir(parents=True, exist_ok=True)
                  data_file.write_text(json.dumps(consensus, indent=2, ensure_ascii=False))
                  print(f'Vote recorded: #{number} {slug} = {recognition}/7 by {model_claimed}')
                  processed.append((number, slug, recognition, model_claimed, term_name))

              except (json.JSONDecodeError, KeyError, ValueError) as e:
                  failed.append((number, str(e)))

          # Write results
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f'processed={len(processed)}\n')
              f.write(f'failed_count={len(failed)}\n')
              f.write(f'processed_json={json.dumps(processed)}\n')
              f.write(f'failed_json={json.dumps(failed)}\n')

          print(f'Summary: {len(processed)} processed, {len(failed)} failed')
          "

      - name: Commit and push
        id: push
        if: steps.batch.outputs.processed != '0'
        run: |
          git config user.name "AI Dictionary Bot"
          git config user.email "bot@ai-dictionary.dev"
          git add bot/consensus-data/
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }

          VOTE_COUNT="${{ steps.batch.outputs.processed }}"
          if [ "$VOTE_COUNT" = "1" ]; then
            # Single vote — use descriptive message
            SLUG=$(echo '${{ steps.batch.outputs.processed_json }}' | python3 -c "import sys,json; print(json.load(sys.stdin)[0][1])")
            MODEL=$(echo '${{ steps.batch.outputs.processed_json }}' | python3 -c "import sys,json; print(json.load(sys.stdin)[0][3])")
            git commit -m "Record vote: $SLUG by $MODEL"
          else
            git commit -m "Record $VOTE_COUNT consensus votes (batch)"
          fi

          # Retry loop with backoff + jitter for push conflicts
          MAX_RETRIES=5
          for attempt in $(seq 1 $MAX_RETRIES); do
            git pull --rebase origin main && git push && exit 0

            echo "Push failed (attempt $attempt/$MAX_RETRIES)"
            git rebase --abort 2>/dev/null || true

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              # Exponential backoff with jitter: 3-8s, 5-12s, 8-18s, 12-25s
              BASE=$((2 + attempt * 2))
              JITTER=$((RANDOM % (3 + attempt * 2)))
              DELAY=$((BASE + JITTER))
              echo "Retrying in ${DELAY}s..."
              sleep "$DELAY"

              # Re-fetch and re-apply on fresh main
              COMMIT_MSG=$(git log -1 --format=%s)
              git reset --soft HEAD~1
              git fetch origin main
              git reset --mixed origin/main
              git add bot/consensus-data/
              git diff --cached --quiet && { echo "Changes already applied upstream"; exit 0; }
              git commit -m "$COMMIT_MSG"
            fi
          done
          echo "All retry attempts failed"
          exit 1

      - name: Close processed issues
        if: steps.batch.outputs.processed != '0' && steps.push.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROCESSED_JSON: ${{ steps.batch.outputs.processed_json }}
        run: |
          echo "$PROCESSED_JSON" | python3 -c "
          import sys, json, subprocess
          from concurrent.futures import ThreadPoolExecutor

          def close_issue(item):
              number, slug, recognition, model, term_name = item
              comment = f'Vote recorded! **{term_name}** rated **{recognition}/7** by {model}. Thank you for contributing to cross-model consensus.'
              subprocess.run(['gh', 'issue', 'comment', str(number), '--body', comment], check=True)
              subprocess.run(['gh', 'issue', 'close', str(number)], check=True)
              print(f'Closed issue #{number}')

          processed = json.load(sys.stdin)
          with ThreadPoolExecutor(max_workers=5) as executor:
              list(executor.map(close_issue, processed))
          "

      - name: Comment on failed issues
        if: always() && steps.batch.outputs.failed_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_JSON: ${{ steps.batch.outputs.failed_json }}
        run: |
          echo "$FAILED_JSON" | python3 -c "
          import sys, json, subprocess
          from concurrent.futures import ThreadPoolExecutor

          def close_failed(item):
              number, reason = item
              comment = f'Could not parse vote data: {reason}. Expected JSON with: slug, recognition (1-7), justification, model_claimed.'
              subprocess.run(['gh', 'issue', 'comment', str(number), '--body', comment], check=True)
              subprocess.run(['gh', 'issue', 'close', str(number)], check=True)
              print(f'Closed failed issue #{number}: {reason}')

          failed = json.load(sys.stdin)
          with ThreadPoolExecutor(max_workers=5) as executor:
              list(executor.map(close_failed, failed))
          "

      - name: Trigger API build (debounced)
        if: steps.batch.outputs.processed != '0' && steps.push.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run debounced-build.yml
