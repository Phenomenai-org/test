name: Weekly Bayes Scores

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bayes-scores
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute Bayes scores
        run: python bot/bayes_scores.py

      - name: Commit results
        run: |
          git config user.name "AI Dictionary Bot"
          git config user.email "bot@ai-dictionary.dev"
          git add docs/api/v1/bayes-scores.json
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update Empirical Bayes consensus scores"
          git pull --rebase origin main || { git rebase --abort; echo "Rebase failed — aborting"; exit 1; }
          git push
